# Build the static export and deploy to GitHub Pages on every push to main.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # `npm install`, not `npm ci`: the lockfile is generated on Windows, where
      # npm omits the wasm32-wasi optional subtrees (@emnapi/*) that
      # @tailwindcss/oxide and sharp declare. `npm ci`'s strict tree check then
      # rejects the lockfile on Linux; a fresh resolve is correct here.
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run contrast # fails the build if any token pair drops below WCAG AA
      - run: npm run build
        env:
          GITHUB_PAGES: "true" # basePath + NEXT_PUBLIC_BASE_PATH derive from this in next.config.ts
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
